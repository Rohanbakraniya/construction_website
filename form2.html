<!DOCTYPE html>
<html lang="en">
<head>
    
    <title>FORM2</title>
</head>
<body bgcolor="FDAAAA">
    <form method="get">
    <h1 align="center">Student Registration Form</h1>
      <table align="center">
        <tr>
            <td>Roll no. :</td>
            <td><input type="text" minlength="4" maxlength="8" required></td>
        </tr>
        <tr>
            <td>Student name:</td>
            <td><input type="text" placeholder="First Name" required>-<input type="text" placeholder="Last Name" required></td>

        </tr>
        <tr>
            <td>Father's name:</td>
            <td><input type="text" required></td>
        </tr>
        <tr>
            <td>Date of Birth:</td>
            <td><input type="date" required>(DD-MM-YYYY)</td>
        </tr>
        <tr>
              <td>Moblie no. :</td>
              
            <td>
                <select>
                      <option value="1" >+91</option>
                      <option value="2" >+1</option>
                      <option value="3" >+49</option>
                </select>
                <input type="text"minlength="10" maxlength="10" placeholder="**********" required>
             </td>
        </tr>
        <tr>
            <td>Email id:</td>
            <td><input type="text" required></td>
        </tr>
        <tr>
            <td>Password:</td>
            <td><input type="text" minlength="5" maxlength="8" placeholder="********" required></td>
        </tr>
        <tr>
            <td>Gender:</td>
            <td><input type="radio" name="gender" required>Male<input type="radio" name="gender" required>Female</td>
        </tr>
        <tr>
            <td>Department:</td>
            <td><input type="checkbox" required>CSE<input type="checkbox" required>IT<input type="checkbox" required>ECE <input type="checkbox" required>Civil <input type="checkbox" required>Mech</td>
         </tr>
         <tr>
            <td>Course:</td>
            <td>
                <select>
                    <option value="1">---select Current Course's---</option>
                    <option value="2">BCA</option>
                    <option value="3">BSC.IT</option>
                    <option value="4">B.COM</option>
                    <option value="5">BBA</option>
                </select>
            </td>
         </tr>
         <tr>
            <td>Student photo:</td>
            <td><input type="file" required></td>
         </tr>
         <tr>
            <td>City:</td>
            <td><input type="text" required></td>
         </tr>
         <tr>
            <td>Address:</td>
            <td><textarea rows="4" cols="30" required></textarea></td>
         </tr>
         <tr>
            <td align="center"><input type="submit"></td>
            <td><input type="reset"></td>
         </tr>
      </table>
     </form>
</body>
</html>
