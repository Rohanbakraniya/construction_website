<!DOCTYPE html>
<html lang="en">
<head>
   
    <title>TABLE</title>
</head>
<body>
      <h1>Comparison of models</h1>
      <table border="1" cellpadding="10" cellspacing="2">
         <tr>
            <th>Model</th>
            <th>OS</th>
            <th>Display</th>
            <th>RAM</th>
         </tr>
         <tr>
            <th>Samsung Galaxy S7</th>
            <td rowspan="2">Android</td>
            <td>5.1"</td>
            <td>4 GB</td>
         </tr>
         <tr>
            <th>Sony xperia Z5</th>
            <td>4.6"</td>
            <td rowspan="2">2 GB</td>
         </tr>
         <tr>
            <th>Apple iPhone 6s</th>
            <td>iOS</td>
            <td>4.7"</td>
         </tr>
      </table>

</body>
</html>





<!DOCTYPE html>
<html lang="en">
<head>
    
    <title>TABLE</title>
</head>
<body>
     <h1>Table Nested Within Table</h1>
       <table  border="1" cellpadding="10" cellspacing="0">
         <tr bgcolor="F5DAA7">
            <th>Name</th>
            <th>Job Title</th>
            <th>Email address</th>
            <th>Nested Table</th>
         </tr>
         <tr>
            <td rowspan="2">Amna Fitzgerald</td>
            <td rowspan="2">Staff Writer</td>
            <td rowspan="2">Example@company.com</td>
            <td>
                <table border="1" cellpadding="10" cellspacing="0">
                    <tr>
                        <th>Home Phone</th>
                        <th>Cell Phone</th>
                    </tr>
                    <tr>
                        <td>888-888-880</td>
                        <td>888-888-881</td>
                    </tr>
                </table>
            </td>
         </tr>
       </table>
    
</body>
</html>
