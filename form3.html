<!DOCTYPE html>
<html lang="en">
<head>

    <title>FORM 3</title>
</head>
<body bgcolor="FBF3D5">
      
       <form method="get">
          <h1 align="center"><font color="red">Student Detail Form</font></h1> 

           <table align="center" border="1" cellpadding="10" cellspacing="0" >
               <tr>
                  <td>Roll No. :</td>
                  <td><input type="text" placeholder="Roll no." required minlength="1" maxlength="5"></td>
               </tr>
               <tr>
                  <td>Name:</td>
                  <td><input type="text" placeholder="Enter Name" required></td>
               </tr>
               <tr>
                  <td>Address:</td>
                  <td><textarea rows="4" cols="30" placeholder="Address" required></textarea></td>
               </tr>
               <tr>
                  <td>Date of Birth:</td>
                  <td><input type="date"></td>
               </tr>
               <tr>
                  <td>Gender:</td>
                  <td><input type="radio" name="gender" required>Male <input type="radio" name="gender" required>Female</td>
               </tr>
               <tr>
                 <td>Hobby:</td>
                 <td>    <input type="checkbox">Cricket
                    <br> <input type="checkbox">Reading 
                    <br> <input type="checkbox">Travelling 
                    <br> <input type="checkbox">Dancing 
                    <br> <input type="checkbox">Singing
                 </td>
                </tr>
                
                <tr>
                    <td>Username:</td>
                    <td><input type="text"  placeholder="Enter Username" required></td>
                </tr>
                <tr>
                    <td>Password:</td>
                    <td><input type="text" placeholder="Enter Password" required minlength="8" maxlength="8"></td>
                </tr>
                <tr>
                    <th colspan="2">
                        <input type="submit">
                        <input type="reset">
                    </th>
                </tr>
           </table>
       </form>

</body>
</html>
